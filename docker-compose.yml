services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: climate_risk
    ports:
      - "5432:5432"
    volumes:
      - crs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d climate_risk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  crs_pgdata:
